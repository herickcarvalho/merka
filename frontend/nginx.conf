# Configuração mínima para servir uma SPA React: qualquer rota
# desconhecida cai de volta em index.html, deixando o react-router
# controlar o roteamento no client-side.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
